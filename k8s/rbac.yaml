apiVersion: v1
kind: Namespace
metadata:
  name: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-marketplace
  namespace: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
rules:
  # ArgoCD Applications
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  # Read pods, services, deployments for resource status
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-marketplace
subjects:
  - kind: ServiceAccount
    name: argo-marketplace
    namespace: argo-marketplace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-marketplace-config
  namespace: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
data:
  ARGOCD_NAMESPACE: "argocd"
  LOG_LEVEL: "info"
