apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-marketplace
  namespace: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-marketplace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo-marketplace
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: argo-marketplace
      containers:
        - name: argo-marketplace
          image: argo-marketplace:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
            - name: CORS_ORIGIN
              value: "*"
            - name: LOCAL_K8S_PLATFORM_PATH
              value: /repo
            - name: ARGOCD_NAMESPACE
              value: argocd
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: repo
              mountPath: /repo
      volumes:
        - name: repo
          hostPath:
            path: /home/ubuntu/local-k8s-platform
            type: Directory
