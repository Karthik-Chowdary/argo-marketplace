apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argo-marketplace
  namespace: argo-marketplace
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: marketplace.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argo-marketplace
                port:
                  name: http
